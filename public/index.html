<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Radio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #111;
            color: #eee;
            font-family: monospace;
            display: flex;
            flex-direction: row;
            min-height: 100vh;
        }

        /* ── Player (sidebar on desktop) ── */
        .player {
            position: fixed;
            top: 0;
            left: 0;
            width: 25%;
            height: 100vh;
            padding: 5vh 2vw;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        h1 {
            font-size: 1.2rem;
            color: #888;
        }

        .now-playing {
            font-size: 0.8rem;
            color: #888;
        }

        .now-playing span {
            color: #eee;
            display: block;
            margin-top: 4px;
            word-break: break-word;
        }

        audio {
            width: 100%;
        }

        /* ── Station list ── */
        .stations {
            margin-left: 25%;
            padding: 5vh 3vw;
            width: 75%;
        }

        .station {
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            border: 1px solid #222;
            border-radius: 4px;
        }

        .station:hover {
            border-color: #444;
            background: #1a1a1a;
        }

        .station.active {
            border-color: #fff;
            color: #fff;
        }

        .station.inactive {
            color: #444;
            cursor: default;
            border-color: #1a1a1a;
        }

        .station.inactive:hover {
            border-color: #1a1a1a;
            background: transparent;
        }

        /* ── Mobile: player moves to top center ── */
        @media (max-width: 1100px) {
            body {
                flex-direction: column;
            }

            .player {
                position: fixed;
                top: 0;
                left: 50%;
                transform: translateX(-50%);
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid #222;
                padding: 4vw;
                background: #111;
                flex-direction: column;
                gap: 0.6rem;
                align-items: center;
                text-align: center;
                z-index: 100;
            }

            audio {
                max-width: 90vw;
            }

            .stations {
                margin-left: 0;
                width: 100%;
                padding: 4vw;
            }
        }
    </style>
</head>
<body>

    <div class="player">
        <h1>college radio</h1>
        <div class="now-playing">
            now playing:
            <span id="now-playing">nothing</span>
        </div>
        <audio id="audio" controls></audio>
    </div>

    <div class="stations" id="stations"></div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const audio = document.getElementById('audio');
        const nowPlaying = document.getElementById('now-playing');
        let activeEl = null;
        let hls = null;

        function adjustPadding() {
            if (window.innerWidth <= 600) {
                const playerHeight = document.querySelector('.player').offsetHeight;
                document.getElementById('stations').style.paddingTop = (playerHeight + 16) + 'px';
            } else {
                document.getElementById('stations').style.paddingTop = '';
            }
        }

        window.addEventListener('resize', adjustPadding);
        window.addEventListener('load', adjustPadding);

        fetch('/api/stations')
            .then(res => res.json())
            .then(stations => {
                const container = document.getElementById('stations');
                stations.forEach(station => {
                    const el = document.createElement('div');
                    el.className = 'station' + (station.active ? '' : ' inactive');
                    el.textContent = station.name;

                    if (station.active) {
                        el.onclick = () => {
                            if (activeEl) activeEl.classList.remove('active');
                            activeEl = el;
                            el.classList.add('active');
                            nowPlaying.textContent = station.name;

                            if (hls) hls.destroy();

                            if (window.currentStationId) {
                                fetch(`/api/stream/${window.currentStationId}/stop`);
                            }
                            window.currentStationId = station.id;

                            fetch(`/api/stream/${station.id}/start`)
                                .then(res => res.json())
                                .then(data => {
                                    hls = new Hls({ liveSyncDurationCount: 3 });
                                    hls.loadSource(data.url);
                                    hls.attachMedia(audio);
                                    hls.on(Hls.Events.MANIFEST_PARSED, () => audio.play());
                                });
                        };
                    }

                    container.appendChild(el);
                });

                adjustPadding();
            });
    </script>
</body>
</html>
