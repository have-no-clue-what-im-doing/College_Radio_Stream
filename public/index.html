<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Radio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #111;
            color: #eee;
            font-family: monospace;
            padding: 40px 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #888;
            
        }

        .station {
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 1px solid #222;
            border-radius: 4px;
        }

        .station:hover {
            border-color: #444;
            background: #1a1a1a;
        }

        .station.active {
            border-color: #fff;
            color: #fff;
        }

        .station.inactive {
            color: #444;
            cursor: default;
            border-color: #1a1a1a;
        }

        .station.inactive:hover {
            border-color: #1a1a1a;
            background: transparent;
        }

        .player {
            position: fixed;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #222;
            width: 20%;
            margin-left: -30%;
        }

        .now-playing {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 10px;
        }

        .now-playing span {
            color: #eee;
        }

        audio {
            width: 100%;
        }
    </style>
</head>
<body>
    

    <div class="player">
        <h1>college radio</h1>
        <div class="now-playing">now playing: <span id="now-playing">nothing</span></div>
        <audio id="audio" controls></audio>
    </div>

    <div id="stations"></div>

    

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const audio = document.getElementById('audio');
        const nowPlaying = document.getElementById('now-playing');
        let activeEl = null;
        let hls = null;

        fetch('/api/stations')
            .then(res => res.json())
            .then(stations => {
                const container = document.getElementById('stations');
                stations.forEach(station => {
                    const el = document.createElement('div');
                    el.className = 'station' + (station.active ? '' : ' inactive');
                    el.textContent = station.name;

                    if (station.active) {
                        el.onclick = () => {
                            if (activeEl) activeEl.classList.remove('active');
                            activeEl = el;
                            el.classList.add('active');
                            nowPlaying.textContent = station.name;

                            if (hls) hls.destroy();

                            // stop previous station's ffmpeg
                            if (window.currentStationId) {
                                fetch(`/api/stream/${window.currentStationId}/stop`);
                            }
                            window.currentStationId = station.id;

                            // start new station
                            fetch(`/api/stream/${station.id}/start`)
                                .then(res => res.json())
                                .then(data => {
                                    hls = new Hls({ liveSyncDurationCount: 3 });
                                    hls.loadSource(data.url);
                                    hls.attachMedia(audio);
                                    hls.on(Hls.Events.MANIFEST_PARSED, () => audio.play());
                                });
                        };
                    }

                    container.appendChild(el);
                });
            });
    </script>
</body>
</html>
